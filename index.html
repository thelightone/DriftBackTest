<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL | Racing</title>

    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">

    <!-- Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
        }

        #unity-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
        }

        #unity-canvas {
            width: 100%;
            height: 100%;
            background: #000;
        }

        #loading {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: Arial;
            z-index: 10;
        }
    </style>
</head>

<body>
    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
        <div id="loading">Loading...</div>
    </div>

    <script>
        console.log("=== TELEGRAM INIT START ===");

        const tg = window.Telegram.WebApp;

        tg.ready();
        tg.expand();

        console.log("Telegram initData:", tg.initData);
        console.log("Telegram user:", tg.initDataUnsafe?.user);

        // Передаем данные в Unity глобально
        window.TelegramWebAppData = {
            initData: tg.initData || "",
            user: tg.initDataUnsafe?.user || null,
            platform: tg.platform,
            version: tg.version
        };

        console.log("=== TELEGRAM INIT END ===");
    </script>

    <script>
        const buildUrl = "Build";
        const loaderUrl = buildUrl + "/Builds.loader.js";

        const config = {
            dataUrl: buildUrl + "/Builds.data",
            frameworkUrl: buildUrl + "/Builds.framework.js",
            codeUrl: buildUrl + "/Builds.wasm",
            streamingAssetsUrl: "StreamingAssets",

            companyName: "DefaultCompany",
            productName: "Racing",
            productVersion: "1.0",

            matchWebGLToCanvasSize: true,
            devicePixelRatio: 1,

            // важно для WebGL persistence
            autoSyncPersistentDataPath: true
        };

        const canvas = document.querySelector("#unity-canvas");
        const loading = document.querySelector("#loading");

        const script = document.createElement("script");
        script.src = loaderUrl;

        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                console.log("Loading progress:", progress);
            }).then((unityInstance) => {
                console.log("=== UNITY LOADED ===");
                loading.style.display = "none";

                // можно дернуть метод в Unity если надо
                // unityInstance.SendMessage("GameObjectName", "OnTelegramReady");
            }).catch((message) => {
                console.error("UNITY LOAD ERROR:", message);
                alert(message);
            });
        };

        document.body.appendChild(script);
    </script>
</body>
</html>
