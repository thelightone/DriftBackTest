<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | DriftBackTest</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #unity-container {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
        }

        #unity-canvas {
            display: block;
            width: 100vw !important;
            height: 100vh !important;
            background: #000;
        }

        #unity-footer {
            display: none !important;
        }

        #unity-warning {
            position: absolute;
            left: 50%;
            top: 20px;
            transform: translateX(-50%);
            z-index: 10;
        }

        #unity-loading-bar {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
        }
    </style>
</head>
<body>
    <div id="unity-container" class="unity-desktop">
        <canvas id="unity-canvas" tabindex="-1"></canvas>

        <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>

        <div id="unity-warning"></div>

        <div id="unity-footer">
            <div id="unity-logo-title-footer"></div>
            <div id="unity-fullscreen-button"></div>
            <div id="unity-build-title">DriftBackTest</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;

        if (tg) {
            tg.ready();

            try {
                tg.expand();
            } catch (e) {
                console.warn("Telegram expand failed:", e);
            }

            try {
                tg.disableVerticalSwipes();
            } catch (e) {
                console.warn("disableVerticalSwipes failed:", e);
            }

            try {
                tg.setHeaderColor("#000000");
                tg.setBackgroundColor("#000000");
            } catch (e) {
                console.warn("Telegram color setup failed:", e);
            }
        }

        var canvas = document.querySelector("#unity-canvas");

        function unityShowBanner(msg, type) {
            var warningBanner = document.querySelector("#unity-warning");

            function updateBannerVisibility() {
                warningBanner.style.display = warningBanner.children.length ? "block" : "none";
            }

            var div = document.createElement("div");
            div.innerHTML = msg;
            warningBanner.appendChild(div);

            if (type == "error") {
                div.style = "background: red; color: white; padding: 10px;";
            } else {
                if (type == "warning") div.style = "background: yellow; color: black; padding: 10px;";
                setTimeout(function () {
                    if (div.parentNode === warningBanner) {
                        warningBanner.removeChild(div);
                        updateBannerVisibility();
                    }
                }, 5000);
            }

            updateBannerVisibility();
        }

        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/Builds.loader.js";

        var config = {
            arguments: [],
            dataUrl: buildUrl + "/Builds.data",
            frameworkUrl: buildUrl + "/Builds.framework.js",
            codeUrl: buildUrl + "/Builds.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "DefaultCompany",
            productName: "DriftBackTest",
            productVersion: "0.1.0",
            showBanner: unityShowBanner,
        };

        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            var meta = document.createElement("meta");
            meta.name = "viewport";
            meta.content = "width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=yes";
            document.getElementsByTagName("head")[0].appendChild(meta);

            document.querySelector("#unity-container").className = "unity-mobile";
            canvas.className = "unity-mobile";

            canvas.style.width = "100vw";
            canvas.style.height = "100vh";
        } else {
            canvas.style.width = "100vw";
            canvas.style.height = "100vh";
        }

        function forceExpandTelegram() {
            if (!tg) return;

            try { tg.expand(); } catch (e) { }
        }

        window.addEventListener("load", () => {
            forceExpandTelegram();
            setTimeout(forceExpandTelegram, 100);
            setTimeout(forceExpandTelegram, 500);
        });

        window.addEventListener("resize", () => {
            canvas.style.width = "100vw";
            canvas.style.height = "100vh";
            forceExpandTelegram();
        });

        document.querySelector("#unity-loading-bar").style.display = "block";

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                document.querySelector("#unity-progress-bar-full").style.width = (100 * progress) + "%";
            }).then((unityInstance) => {
                document.querySelector("#unity-loading-bar").style.display = "none";

                const fullscreenButton = document.querySelector("#unity-fullscreen-button");
                if (fullscreenButton) {
                    fullscreenButton.onclick = () => {
                        unityInstance.SetFullscreen(1);
                    };
                }

                forceExpandTelegram();
                setTimeout(forceExpandTelegram, 200);
            }).catch((message) => {
                alert(message);
            });
        };

        document.body.appendChild(script);
    </script>
</body>
</html>
