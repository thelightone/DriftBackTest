<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL | Racing</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #unity-container {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
        }

        #unity-canvas {
            width: 100%;
            height: 100%;
            background: #000;
            display: block;
        }

        #loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            background: url("TemplateData/loading-bg.jpg") center center / cover no-repeat;
            z-index: 20;
        }

        #loading-box {
            width: min(420px, 82vw);
            margin-bottom: 54px;
            text-align: center;
        }

        #loading-bar-bg {
            width: 100%;
            height: 12px;
            background: rgba(255,255,255,0.18);
            border-radius: 999px;
            overflow: hidden;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.12), 0 6px 20px rgba(0,0,0,0.3);
        }

        #loading-bar-fill {
            position: relative;
            width: 0%;
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, #ffffff 0%, #f2f2f2 50%, #ffffff 100%);
            box-shadow: 0 0 10px rgba(255,255,255,0.5), 0 0 20px rgba(255,255,255,0.2);
            transition: width 0.18s ease-out;
            overflow: hidden;
        }

            #loading-bar-fill::after {
                content: "";
                position: absolute;
                top: 0;
                left: -35%;
                width: 35%;
                height: 100%;
                background: linear-gradient( 90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.7) 50%, rgba(255,255,255,0) 100% );
                animation: loadingShine 1.2s linear infinite;
            }

        @keyframes loadingShine {
            0% {
                left: -35%;
            }

            100% {
                left: 135%;
            }
        }

        #loading-percent {
            margin-top: 12px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        #warning-banner {
            position: absolute;
            left: 50%;
            bottom: 16px;
            transform: translateX(-50%);
            z-index: 30;
            color: white;
            background: rgba(255, 80, 80, 0.92);
            padding: 10px 14px;
            border-radius: 10px;
            max-width: 90vw;
            text-align: center;
            display: none;
        }
    </style>
</head>

<body>
    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>

        <div id="loading-overlay">
            <div id="loading-box">
                <div id="loading-bar-bg">
                    <div id="loading-bar-fill"></div>
                </div>
                <div id="loading-percent">0%</div>
            </div>
        </div>

        <div id="warning-banner"></div>
    </div>

    <script>
        console.log("=== TELEGRAM INIT START ===");

        const tg = window.Telegram?.WebApp;

        if (tg) {
            tg.ready();
            tg.expand();

            window.TelegramWebAppData = {
                initData: tg.initData || "",
                user: tg.initDataUnsafe?.user || null,
                platform: tg.platform || "",
                version: tg.version || ""
            };
        } else {
            window.TelegramWebAppData = {
                initData: "",
                user: null,
                platform: "",
                version: ""
            };
        }

        console.log("=== TELEGRAM INIT END ===");
    </script>

    <script>
        const buildUrl = "Build";
        const loaderUrl = buildUrl + "/Builds.loader.js";

        const config = {
            dataUrl: buildUrl + "/Builds.data",
            frameworkUrl: buildUrl + "/Builds.framework.js",
            codeUrl: buildUrl + "/Builds.wasm",
            streamingAssetsUrl: "StreamingAssets",

            companyName: "DefaultCompany",
            productName: "Racing",
            productVersion: "1.0",

            matchWebGLToCanvasSize: true,
            devicePixelRatio: window.devicePixelRatio || 1,
            autoSyncPersistentDataPath: true
        };

        const canvas = document.querySelector("#unity-canvas");
        const loadingOverlay = document.querySelector("#loading-overlay");
        const loadingBarFill = document.querySelector("#loading-bar-fill");
        const loadingPercent = document.querySelector("#loading-percent");
        const warningBanner = document.querySelector("#warning-banner");

        function showWarning(message) {
            warningBanner.textContent = message;
            warningBanner.style.display = "block";
        }

        const script = document.createElement("script");
        script.src = loaderUrl;

        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                const percent = Math.round(progress * 100);
                loadingBarFill.style.width = percent + "%";
                loadingPercent.textContent = percent + "%";
            }).then((unityInstance) => {
                loadingOverlay.style.display = "none";
            }).catch((message) => {
                showWarning("Failed to load the game: " + message);
            });
        };

        script.onerror = () => {
            showWarning("Failed to load Unity loader script.");
        };

        document.body.appendChild(script);
    </script>
</body>
</html>
